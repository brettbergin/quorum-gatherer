name: Coverage

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write        # py-cov-action stores the badge + report on a data branch
  pull-requests: write   # ...and posts/updates the coverage comment on PRs

env:
  UV_PYTHON: "3.14"

# Serialize per ref. On a merge, the merge commit AND the auto-bump commit both push to
# main seconds apart; each Coverage run pushes the badge to the data branch, so without
# this they race and the loser's push is rejected. cancel-in-progress lets the newer
# (final) commit win instead of erroring.
concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # PySide6's offscreen platform plugin still needs these shared libs to import.
      - name: Install Qt runtime libs (for headless desktop tests)
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install workspace
        run: uv sync --all-packages
      # --frozen: never rewrite uv.lock here. The py-cov-action below runs as root and
      # leaves uv.lock root-owned, so a later lock write would fail with "permission denied".
      - name: Run tests with coverage
        run: uv run --frozen python -m pytest --cov --cov-report= --cov-fail-under=0
      - name: Coverage comment + badge
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Enforce 70% minimum
        run: uv run --frozen coverage report --fail-under=70
