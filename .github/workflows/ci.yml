name: CI

on:
  push:
    branches: [main, desktop-apps]
  pull_request:

env:
  UV_PYTHON: "3.14"

jobs:
  # ---------------------------------------------------------------- source-code checks
  # One job per task so each shows up as its own status check and they run in parallel.
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # The desktop GUI tests import PySide6 and create an offscreen QApplication, whose
      # platform plugin needs these shared libs present on the headless runner.
      - name: Install Qt runtime libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install workspace
        run: uv sync --all-packages
      - name: Tests
        run: uv run python -m pytest
      - name: Desktop engine selftest (headless)
        run: uv run python desktop/run.py --selftest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install workspace
        run: uv sync --all-packages
      - name: Ruff lint
        run: uv run ruff check quorum_core desktop

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install workspace
        run: uv sync --all-packages
      - name: Ruff format check
        run: uv run ruff format --check quorum_core desktop

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install workspace
        run: uv sync --all-packages
      - name: mypy
        run: uv run mypy quorum_core/quorum_core desktop/quorum_desktop

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install workspace
        run: uv sync --all-packages
      - name: Bandit
        # Gate on medium+ severity; low-severity findings (e.g. assert usage) don't fail CI.
        run: uv run bandit -c pyproject.toml -r quorum_core/quorum_core desktop/quorum_desktop --severity-level medium

  # Build the desktop bundle on both target OSes and smoke-test the FROZEN app, so the
  # PyInstaller spec (datas/hidden imports) is verified on PRs — release.yml only runs on
  # tags, so without this a packaging break wouldn't surface until a release.
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            selftest: ./desktop/dist/quorum-gatherer.app/Contents/MacOS/quorum-gatherer --selftest
          - os: windows-latest
            selftest: ./desktop/dist/quorum-gatherer/quorum-gatherer.exe --selftest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install workspace
        run: uv sync --all-packages
      - name: Build desktop bundle (PyInstaller)
        working-directory: desktop
        run: uv run pyinstaller release/quorum_desktop.spec --noconfirm
      - name: Frozen bundle selftest
        run: ${{ matrix.selftest }}
